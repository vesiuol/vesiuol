<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sobre — Meus Livros</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#F5F0E8; --dark:#1C1A17; --accent:#C8472B;
  --warm:#E8A87C; --muted:#8C8070; --card:#FFFDF8; --border:#E0D8CC;
  --green:#2E7D52; --green-light:#D4EDDA;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--dark);font-family:'DM Sans',sans-serif;font-weight:300;}
nav{
  position:sticky;top:0;z-index:100;background:var(--dark);
  padding:0 2rem;display:flex;align-items:center;gap:2rem;height:56px;
}
nav .logo{font-family:'Playfair Display',serif;font-style:italic;color:var(--cream);font-size:1.3rem;text-decoration:none;white-space:nowrap;}
nav ul{list-style:none;display:flex;gap:1.5rem;margin-left:auto;}
nav ul a{color:var(--muted);text-decoration:none;font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;transition:color .2s;}
nav ul a:hover,nav ul a.active{color:var(--cream);}
.nav-hamburger{display:none;background:none;border:none;color:var(--cream);font-size:1.4rem;cursor:pointer;margin-left:auto;}

.hero{padding:5rem 2rem 3rem;max-width:860px;margin:0 auto;}
.eyebrow{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.8rem;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,5vw,4rem);line-height:1.05;margin-bottom:1.5rem;}
.hero h1 em{font-style:italic;color:var(--accent);}
.hero p{color:var(--muted);font-size:1rem;line-height:1.8;max-width:540px;margin-bottom:.8rem;}
.hero-line{width:48px;height:2px;background:var(--accent);margin:1.5rem 0;}

.stats-bar{background:var(--dark);padding:2rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:0;}
.stat-item{text-align:center;padding:1rem;border-right:1px solid #2a2825;}
.stat-item:last-child{border-right:none;}
.stat-number{font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--cream);display:block;line-height:1;}
.stat-label{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:.3rem;display:block;}

section{max-width:1100px;margin:0 auto;padding:4rem 2rem;}
.section-header{display:flex;align-items:baseline;gap:1rem;margin-bottom:2.5rem;border-bottom:1px solid var(--border);padding-bottom:.8rem;}
.section-header h2{font-family:'Playfair Display',serif;font-size:1.6rem;}
.section-header span{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}

.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:1.5rem;}
.chart-card.full{grid-column:1/-1;}
.chart-card.third{grid-column:span 1;}
.chart-title{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}
.chart-wrap{position:relative;height:220px;}
.chart-wrap.tall{height:300px;}
.chart-wrap.short{height:160px;}

#map,#dlm-map{height:400px;border-radius:2px;border:1px solid var(--border);}

/* TABLE */
.table-controls{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.search-wrap{flex:1;min-width:180px;position:relative;}
.search-wrap input{width:100%;padding:.6rem 1rem .6rem 2.2rem;border:1px solid var(--border);background:var(--card);font-family:'DM Sans',sans-serif;font-size:.85rem;border-radius:2px;outline:none;color:var(--dark);}
.search-wrap::before{content:'⌕';position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--muted);}
.filter-select{padding:.6rem .9rem;border:1px solid var(--border);background:var(--card);font-family:'DM Sans',sans-serif;font-size:.82rem;border-radius:2px;color:var(--dark);cursor:pointer;outline:none;}
.tag-filters{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem;}
.tag-btn{padding:.3rem .8rem;border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:.72rem;letter-spacing:.06em;border-radius:100px;cursor:pointer;transition:all .2s;color:var(--muted);}
.tag-btn.active{background:var(--dark);border-color:var(--dark);color:var(--cream);}
table{width:100%;border-collapse:collapse;font-size:.83rem;}
thead tr{border-bottom:2px solid var(--dark);}
th{padding:.6rem .8rem;text-align:left;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--dark);}
td{padding:.65rem .8rem;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:rgba(200,71,43,.04);}
.badge{display:inline-block;padding:.18rem .55rem;border-radius:100px;font-size:.7rem;}
.badge-lido{background:#D4EDDA;color:#1A6631;}
.badge-nao{background:#FFE8E4;color:#9B2B1A;}
.badge-lendo{background:#FFF3CD;color:#8A6200;}
.stars{color:var(--accent);}
.table-footer{padding:.8rem 0;color:var(--muted);font-size:.8rem;display:flex;justify-content:space-between;align-items:center;}
.pagination{display:flex;gap:.3rem;flex-wrap:wrap;}
.page-btn{width:30px;height:30px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:.8rem;border-radius:2px;transition:all .15s;}
.page-btn.active{background:var(--dark);color:var(--cream);border-color:var(--dark);}
.page-btn:hover:not(.active){border-color:var(--dark);}

/* PROGRESS */
.progress-card{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:2rem;display:grid;grid-template-columns:1fr 1fr;gap:2.5rem;align-items:center;}
.progress-bar-wrap{background:var(--border);height:5px;border-radius:3px;overflow:hidden;margin:.8rem 0 .4rem;}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 1s ease;}
.progress-pct{font-size:.75rem;color:var(--muted);}
.pstat{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border);}
.pstat:last-child{border-bottom:none;}
.pstat-label{font-size:.8rem;color:var(--muted);}
.pstat-val{font-family:'Playfair Display',serif;font-size:1.3rem;}

/* VITRINE CARDS */
.vitrine-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.2rem;}
.vitrine-card{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:1.8rem;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:.8rem;transition:transform .2s,box-shadow .2s;}
.vitrine-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.08);}
.vitrine-tag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);}
.vitrine-title{font-family:'Playfair Display',serif;font-size:1.1rem;}
.vitrine-desc{font-size:.83rem;color:var(--muted);line-height:1.6;flex:1;}
.vitrine-arrow{color:var(--accent);font-size:.9rem;margin-top:.5rem;}

footer{background:var(--dark);padding:1.5rem;text-align:center;color:var(--muted);font-size:.75rem;letter-spacing:.04em;}

@media(max-width:700px){
  .charts-grid{grid-template-columns:1fr;}
  .progress-card{grid-template-columns:1fr;}
  nav ul{display:none;position:absolute;top:56px;left:0;right:0;background:var(--dark);flex-direction:column;padding:1rem 2rem;gap:1rem;}
  nav ul.open{display:flex;}
  .nav-hamburger{display:block;}
}
.sobre-content{max-width:680px;margin:0 auto;padding:5rem 2rem 8rem;}
.placeholder{background:var(--card);border:1.5px dashed var(--border);border-radius:2px;padding:2.5rem;text-align:center;color:var(--muted);line-height:1.7;margin-bottom:1.5rem;}
.placeholder strong{display:block;font-size:.95rem;color:var(--dark);margin-bottom:.4rem;}
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">meus livros</a>
  <ul>
    <li><a href="index.html" data-page="index">Início</a></li>
    <li><a href="2026.html" data-page="2026">2026</a></li>
    <li><a href="estante.html" data-page="estante">Estante</a></li>
    <li><a href="historico.html" data-page="historico">Histórico</a></li>
    <li><a href="desafio.html" data-page="desafio">Desafio</a></li>
    <li><a href="sobre.html" data-page="sobre">Sobre</a></li>
  </ul>
  <button class="nav-hamburger" onclick="document.querySelector('nav ul').classList.toggle('open')">☰</button>
</nav>
<div class="sobre-content">
  <p class="eyebrow">Quem sou eu</p>
  <h1 style="font-family:'Playfair Display',serif;font-size:clamp(2.2rem,5vw,3.5rem);line-height:1.1;margin-bottom:2rem;">Sobre <em style="font-style:italic;color:var(--accent)">mim</em></h1>
  <div style="width:48px;height:2px;background:var(--accent);margin:0 0 2rem;"></div>
  <div class="placeholder">
    <strong>✏️ Seu texto aqui</strong>
    Me mande o texto e atualizo esta página!
  </div>
  <div class="placeholder">
    <strong>📚 Segundo parágrafo (opcional)</strong>
    Sobre sua relação com os livros, o Desafio Livros pelo Mundo, seus projetos…
  </div>
</div>
<footer>dados via Google Sheets</footer>
<script>document.querySelectorAll('nav ul a[data-page="sobre"]').forEach(a=>a.classList.add('active'));</script>
</body>
</html>
