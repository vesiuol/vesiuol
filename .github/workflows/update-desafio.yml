name: Atualizar dados do Desafio LPM

on:
  schedule:
    - cron: '0 9 * * *'   # todo dia às 9h UTC (~6h Brasília)
  workflow_dispatch:        # permite rodar manualmente pelo botão

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/fetch-notion-desafio.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/desafio.json
          git diff --staged --quiet || git commit -m "Atualiza dados do Desafio LPM"
          git push
