function norm(s){ return (s||'').trim().toLowerCase(); }
function fetchCSV(url){
  return new Promise((res,rej)=>{
    Papa.parse(url,{download:true,header:true,skipEmptyLines:true,complete:r=>res(r.data),error:rej});
  });
}
function topN(obj,n){ return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n); }
function findField(row, candidates){
  if(!row) return '';
  const keys = Object.keys(row);
  for(const cand of candidates){
    const cn = norm(cand);
    const exact = keys.find(k=>norm(k)===cn);
    if(exact && row[exact] && row[exact].trim()) return row[exact].trim();
    const partial = keys.find(k=>norm(k).includes(cn)||cn.includes(norm(k)));
    if(partial && row[partial] && row[partial].trim()) return row[partial].trim();
  }
  return '';
}
function filterLPM(rows){
  return rows.filter(r=>Object.values(r).some(v=>norm(v||'').includes('desafio lpm')));
}
/* Considera concluído apenas o que tem LIDO exato na coluna (2025/2026).
   2024 não tem essa coluna na planilha — todas as linhas lá já são leituras fechadas. */
function isFinished(row, hasLidoCol){
  if(!hasLidoCol) return true;
  return (findField(row,['LIDO'])||'').trim() === 'LIDO';
}
function countField(rows, candidates){
  const c={};
  rows.forEach(r=>{ const v=findField(r,candidates); if(v) c[v]=(c[v]||0)+1; });
  return c;
}
function scrollTo(id){
  const el = document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

function buildPerfil(allLPM){
  /* ── Modelo 1: texto grid ── */
  const gaCount  = countField(allLPM,['Se identifica como...','Gênero do autor','Gênero autor']);
  const corCount = countField(allLPM,['Cor','cor do autor','raça','Raça']);
  const idCount  = countField(allLPM,['Idioma','idioma original']);
  const fmCount  = countField(allLPM,['Formato']);
  const fxCount  = countField(allLPM,['Faixa etária','Faixa etaria','faixa']);

  const topGa  = topN(gaCount,1)[0];
  const topCor = topN(corCount,1)[0];
  const topId  = topN(idCount,1)[0];
  const topFm  = topN(fmCount,1)[0];
  const topFx  = topN(fxCount,1)[0];

  if(topGa)  { document.getElementById('pg-genero').textContent     = topGa[0]; document.getElementById('pg-genero-sub').textContent = topGa[1]+' livros'; }
  if(topCor) { document.getElementById('pg-cor').textContent        = topCor[0]; document.getElementById('pg-cor-sub').textContent   = topCor[1]+' livros'; }
  if(topId)  { document.getElementById('pg-idioma').textContent     = topId[0]; }
  if(topFm)  { document.getElementById('pg-formato').textContent    = topFm[0]; }
  if(topFx)  { document.getElementById('pg-faixa').textContent      = topFx[0]; }

  const notas = [0,0,0,0,0];
  allLPM.forEach(r=>{ const n=parseInt(findField(r,['NOTA','Nota','nota'])||'0'); if(n>=1&&n<=5) notas[n-1]++; });
  const total = notas.reduce((a,b)=>a+b,0);
  const media = total>0 ? (notas.reduce((a,v,i)=>a+v*(i+1),0)/total).toFixed(1) : '—';
  document.getElementById('pg-nota').textContent = media+' ★';

  /* ── Modelo 2: cards diversidade ── */
  function pctSim(count){
    const total = Object.values(count).reduce((a,b)=>a+b,0);
    const sim   = Object.entries(count).filter(([k])=>/^(sim|true)$/i.test(k)).reduce((a,[,v])=>a+v,0);
    return total>0 ? { pct: Math.round(sim/total*100), total } : { pct:0, total:0 };
  }
  const lgbtq = pctSim(countField(allLPM,['Protagonista LGBTQ+','lgbtq']));
  const div   = pctSim(countField(allLPM,['Diversidade etnica/racial','Diversidade étnica/racial','diversidade']));
  const own   = pctSim(countField(allLPM,['#OwnVoices?','OwnVoices','ownvoices']));

  document.getElementById('dc-lgbtq').textContent     = lgbtq.pct+'%';
  document.getElementById('dc-lgbtq-sub').textContent = 'de '+lgbtq.total+' livros lidos';
  document.getElementById('dc-lgbtq-bar').style.width = lgbtq.pct+'%';
  document.getElementById('dc-div').textContent       = div.pct+'%';
  document.getElementById('dc-div-sub').textContent   = 'de '+div.total+' livros lidos';
  document.getElementById('dc-div-bar').style.width   = div.pct+'%';
  document.getElementById('dc-own').textContent       = own.pct+'%';
  document.getElementById('dc-own-sub').textContent   = 'de '+own.total+' livros lidos';
  document.getElementById('dc-own-bar').style.width   = own.pct+'%';

  /* ── Modelo 3: rankings com barras de texto ── */
  function buildRank(elId, obj, maxItems){
    const el = document.getElementById(elId); if(!el) return;
    const pairs = topN(obj, maxItems);
    if(!pairs.length) return;
    const max = pairs[0][1];
    el.innerHTML = pairs.map(([label,val],i)=>`
      <div class="rank-item">
        <div class="rank-header">
          <span><span class="rank-pos">${i+1}.</span><span class="rank-name">${label}</span></span>
          <span class="rank-val">${val}</span>
        </div>
        <div class="rank-track"><div class="rank-fill${i>0?' light':''}" style="width:${Math.round(val/max*100)}%"></div></div>
      </div>`).join('');
  }

  const rc={};
  allLPM.forEach(r=>{ const p=findField(r,['País','Pais']); const rg=REGIAO[p]||'Outros'; rc[rg]=(rc[rg]||0)+1; });
  buildRank('rank-regioes', rc, 999);
  buildRank('rank-generos', countField(allLPM,['Gênero','Genero','gênero literário']), 999);

  /* ── Modelo 4: notas — padronizado no formato de linha/área (Governança, decisão 2026-07-04) ── */
  const notasEl = document.getElementById('c-notas');
  if(notasEl){
    const opts={maintainAspectRatio:false,layout:{padding:{top:22}},
      plugins:{legend:{display:false},datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>0,anchor:'end',align:'top',color:DARK,font:{family:'DM Sans',size:10,weight:'500'},formatter:v=>v>0?v:'',clamp:true}},
      scales:{x:{grid:{color:'#eee',lineWidth:.7},ticks:{font:{family:'DM Sans',size:10},color:MUTED},border:{display:false}},y:{grid:{color:'#eee',lineWidth:.7},ticks:{font:{family:'DM Sans',size:10},color:MUTED},border:{display:false},beginAtZero:true}}};
    new Chart(notasEl,{type:'line',data:{labels:['★','★★','★★★','★★★★','★★★★★'],datasets:[{data:notas,borderColor:GREEN,backgroundColor:GREEN+'22',borderWidth:2.5,pointRadius:5,pointBackgroundColor:GREEN,fill:true,tension:.35}]},options:opts});
  }

  /* barras horizontais origem */
  const origEl = document.getElementById('c-origem');
  if(origEl){
    const pairs = topN(countField(allLPM,['Origem do livro?','Origem do livro']),6);
    if(pairs.length){
      origEl.style.maxHeight='200px';
      const opts={maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},datalabels:{display:true,anchor:'end',align:'end',color:DARK,font:{family:'DM Sans',size:10,weight:'500'},formatter:v=>v>0?v:'',clip:false,clamp:false,offset:6}},scales:{x:{grid:{color:'#eee'},ticks:{font:{family:'DM Sans',size:11},color:MUTED},stepSize:1},y:{grid:{color:'#eee'},ticks:{font:{family:'DM Sans',size:11},color:MUTED}}}};
      new Chart(origEl,{type:'bar',data:{labels:pairs.map(e=>e[0]),datasets:[{data:pairs.map(e=>e[1]),backgroundColor:GREEN,borderRadius:3}]},options:opts});
    }
  }
}

function buildMap(){
  const map=L.map('dlm-map').setView([20,10],2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
  NOTION_DATA.forEach(n=>{
    const pais=n.pais.replace(/\*+$/,'').trim();
    const c=COORDS[pais]; if(!c) return;
    const sr=getStatusReal(n);
    const color = sr==='lido' ? GREEN : n.livro ? GREEN_LIGHT : '#bbb';
    L.circleMarker(c,{radius:7,fillColor:color,color:'#fff',weight:1.5,fillOpacity:.85}).addTo(map)
      .bindPopup('<strong>'+n.pais+'</strong>'+(n.livro?'<br><em>'+n.livro+'</em>':'')+(n.autor?'<br>'+n.autor:''));
  });
}

function buildEvolucao(r24,r25,r26){
  const TOTAL=209;
  const n24=r24.length, n25=r25.length, n26=r26.length;
  const acum24=n24, acum25=n24+n25, acum26=n24+n25+n26, total=acum26;

  /* Cards */
  const cardEl=document.getElementById('evolucao-cards');
  if(cardEl){
    cardEl.innerHTML=[
      {ano:'2024',num:n24,sub:acum24+' acumulado'},
      {ano:'2025',num:n25,sub:acum25+' acumulado'},
      {ano:'2026',num:n26,sub:acum26+' acumulado',dest:true},
      {ano:'Faltam',num:TOTAL-total,sub:'de '+TOTAL+' países'},
    ].map(c=>`<div class="evolucao-card${c.dest?' destaque':''}"><div class="ev-ano">${c.ano}</div><div class="ev-num">${c.num}</div><div class="ev-sub">${c.sub}</div></div>`).join('');
  }

  /* Barra progresso */
  const progEl=document.getElementById('barra-progresso-geral');
  if(progEl){
    const pct=Math.round(total/TOTAL*100);
    progEl.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;font-size:.88rem"><span><strong>${total}</strong> países lidos no desafio</span><span style="font-size:.72rem;color:var(--muted)">${pct}% de ${TOTAL}</span></div><div class="prog-track-lg"><div class="prog-fill-lg" style="width:0%" id="pfl"></div></div><div class="prog-labels"><span>0</span><span style="color:var(--green);font-weight:500">${total} ✓</span><span>${TOTAL}</span></div>`;
    setTimeout(()=>{ const el=document.getElementById('pfl'); if(el) el.style.width=pct+'%'; },400);
  }

  /* Linha acumulada */
  const linhaEl=document.getElementById('c-evolucao-linha');
  if(linhaEl){
    const mes=new Date().getMonth()+1;
    const ritmo26=n26>0?Math.round(n26/mes*12):0;
    const media=n24>0&&n25>0?Math.round((n24+n25+ritmo26)/3):Math.max(n24,n25,ritmo26)||1;
    const labR=['2024','2025','2026'], dadR=[acum24,acum25,acum26];
    const ap=[]; let ac=total; let ay=2027;
    while(ac<TOTAL&&ay<=2040){ ap.push(ay); ac=Math.min(ac+Math.round(media),TOTAL); ay++; }
    const lp=ap, dp=lp.map((_,i)=>Math.min(total+Math.round(media*(i+1)),TOTAL));
    const allL=[...labR,...lp.map(String)];
    const allR=[...dadR,...Array(lp.length).fill(null)];
    const allP=[...Array(labR.length-1).fill(null),acum26,...dp];
    new Chart(linhaEl,{type:'line',data:{labels:allL,datasets:[
      {label:'Real',data:allR,borderColor:GREEN,backgroundColor:GREEN+'22',borderWidth:2.5,pointRadius:4,pointBackgroundColor:GREEN,fill:true,tension:.3,spanGaps:false},
      {label:'Projeção',data:allP,borderColor:'#ccc',backgroundColor:'transparent',borderWidth:1.5,borderDash:[5,4],pointRadius:2,pointBackgroundColor:'#ccc',fill:false,tension:.3,spanGaps:false}
    ]},options:{maintainAspectRatio:false,plugins:{legend:{display:true,labels:{font:{family:'DM Sans',size:10},color:DARK,boxWidth:10,padding:12}},datalabels:{display:ctx=>ctx.datasetIndex===0&&ctx.raw!==null,color:DARK,font:{family:'DM Sans',size:10,weight:'500'},anchor:'end',align:'top',formatter:v=>v!=null?v:''}},scales:{x:{grid:{color:'#eee'},ticks:{font:{family:'DM Sans',size:10},color:MUTED}},y:{grid:{color:'#eee'},ticks:{font:{family:'DM Sans',size:10},color:MUTED,stepSize:10},min:0,max:TOTAL}}}});

    /* Projeção textual */
    const projEl=document.getElementById('projecao-body');
    if(projEl){
      const ar=media>0?Math.ceil((TOTAL-total)/media):'—';
      const ac2=media>0?2026+ar:'—';
      projEl.innerHTML=`
        <div class="proj-linha"><span class="proj-label">Ritmo médio (2024–2025)</span><span class="proj-val">${((n24+n25)/2).toFixed(1)}/ano</span></div>
        <div class="proj-linha"><span class="proj-label">Ritmo 2026 (anualizado)</span><span class="proj-val">~${ritmo26}/ano</span></div>
        <div class="proj-linha"><span class="proj-label">Total lido até hoje</span><span class="proj-val">${total} de ${TOTAL}</span></div>
        <div class="proj-linha"><span class="proj-label">Ainda faltam</span><span class="proj-val">${TOTAL-total} países</span></div>
        <div class="proj-linha" style="margin-top:6px;padding-top:8px;border-top:2px solid var(--green)"><span class="proj-label">Conclusão estimada</span><span class="proj-dest">${ac2}</span></div>
        <p style="font-size:.72rem;color:var(--muted);margin-top:.8rem;line-height:1.5">Baseado no ritmo de ~${media} países/ano. 2026 estimado com base nos ${mes} meses decorridos.</p>`;
    }
  }
}

let NOTION_DATA = [];

const NOTION_PAGE=15;

function getStatusReal(n){
  if(n.status_real) return n.status_real;
  if(n.status_notion==='Concluído') return 'lido';
  if(n.status_notion==='Em andamento') return 'andamento';
  if(n.livro&&n.livro.trim()) return 'mapeado';
  return 'nao';
}
function crossExcelIntoNotion(allLPM){
  const lidos=new Set();
  allLPM.forEach(r=>{ const t=findField(r,['Livros','Título','Titulo','Livro','Book','Title']); if(t) lidos.add(norm(t)); });
  notionData.forEach(n=>{ n.status_real = n.livro&&lidos.has(norm(n.livro)) ? 'lido' : getStatusReal(n); });
  renderNotion();
  const el=document.getElementById('lista-loading');
  if(el) el.textContent=lidos.size+' livros lidos cruzados';
}
function setPillFilter(f,btn){
  pillFilter=f;
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.fpill').forEach(b=>{ if(b.dataset.f===f) b.classList.add('active'); else b.classList.remove('active'); });
  notionPage=1; renderNotion();
}
function setSidebarFilter(f,btn){
  pillFilter=f;
  document.querySelectorAll('.fpill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.filter-pill').forEach(b=>{ if(b.dataset.f===f) b.classList.add('active'); else b.classList.remove('active'); });
  notionPage=1; renderNotion();
  document.getElementById('lista').scrollIntoView({behavior:'smooth'});
}
function sortNotion(key){
  if(notionSortKey===key) notionSortDir*=-1; else{notionSortKey=key;notionSortDir=1;}
  renderNotion();
}
function renderNotion(){
  const q=(document.getElementById('search-notion')?.value||'').toLowerCase();
  notionFiltered=notionData.filter(n=>{
    const sr=getStatusReal(n);
    if(pillFilter==='lido'    && sr!=='lido') return false;
    if(pillFilter==='mapeado' && sr!=='mapeado'&&sr!=='andamento') return false;
    if(pillFilter==='nao'     && sr!=='nao') return false;
    if(q&&!(n.pais+n.livro+n.autor).toLowerCase().includes(q)) return false;
    return true;
  });
  notionFiltered.sort((a,b)=>(a[notionSortKey]||'').localeCompare(b[notionSortKey]||'')*notionSortDir);
  const total=notionFiltered.length;
  document.getElementById('notion-count').textContent=total+' países';
  const pages=Math.ceil(total/NOTION_PAGE);
  const start=(notionPage-1)*NOTION_PAGE;
  const slice=notionFiltered.slice(start,start+NOTION_PAGE);
  document.getElementById('notion-tbody').innerHTML=slice.map(n=>{
    const sr=getStatusReal(n);
    const rowBg=sr==='lido'?'background:rgba(132,153,116,.05)':'';
    const badge=sr==='lido'?'<span class="badge badge-lido">Lido ✓</span>':sr==='andamento'?'<span class="badge badge-andamento">Lendo…</span>':sr==='mapeado'?'<span class="badge badge-mapeado">Mapeado</span>':'<span class="badge badge-nao">—</span>';
    const capa=n.capa?`<img class="book-cover" src="${n.capa}" alt="${n.livro||''}" loading="lazy" onerror="this.outerHTML='<div class=\\'cover-ph\\'>—</div>'">`:`<div class="cover-ph">—</div>`;
    const livroText=n.livro?`<span style="font-weight:500">${n.livro}</span>`:'<span style="color:#aaa">—</span>';
    return `<tr style="${rowBg}"><td>${capa}</td><td><strong>${n.pais}</strong></td><td>${livroText}</td><td>${n.autor||'—'}</td><td>${n.ga||'—'}</td><td>${badge}</td></tr>`;
  }).join('');
  const pg=document.getElementById('notion-pagination');
  pg.innerHTML='';
  for(let i=1;i<=pages;i++){
    const btn=document.createElement('button');
    btn.className='page-btn'+(i===notionPage?' active':'');
    btn.textContent=i;
    btn.onclick=()=>{notionPage=i;renderNotion();document.getElementById('lista').scrollIntoView({behavior:'smooth'});};
    pg.appendChild(btn);
  }
}

/* Carrega os dados do desafio a partir do JSON gerado pelo GitHub Action
   (data/desafio.json), que busca a database do Notion automaticamente. */
async function loadNotionData(){
  try{
    const res = await fetch('data/desafio.json');
    NOTION_DATA = await res.json();
  }catch(e){
    console.warn('Erro ao carregar data/desafio.json', e);
    NOTION_DATA = [];
  }
  notionData = NOTION_DATA.map(r=>({...r}));
  notionFiltered = [...notionData];
  notionData.forEach(n=>{ n.status_real=getStatusReal(n); });
  renderNotion();
  init();
}
loadNotionData();
</script>
